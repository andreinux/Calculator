<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width , initial-scale=1.0">
  <script src="main.js" defer></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

 



  <div id="main-container">
    <div id="display-box">
      <p class="current">0</p>
    </div>

    <div id="container-allButtons">
      <div id="left-column">


        <div id="num-container">
          <button class="button" id="reset">C</button>
          <button class="button" id="erase">Del</button>
          <button class="button" id="decimal">.</button>

          <button class="nbutton" id="btn-7">7</button>
          <button class="nbutton" id="btn-8">8</button>
          <button class="nbutton" id="btn-9">9</button>
          <button class="nbutton" id="btn-4">4</button>
          <button class="nbutton" id="btn-5">5</button>
          <button class="nbutton" id="btn-6">6</button>
          <button class="nbutton" id="btn-1">1</button>
          <button class="nbutton" id="btn-2">2</button>
          <button class="nbutton" id="btn-3">3</button>
          <button class="nbutton" id="btn-0">0</button>
        </div>

      </div>

      <div id="right-column">
        <button class="button" id="divide">÷</button>
        <button class="button" id="multiply">X</button>
        <button class="button" id="subtract">—</button>
        <button class="button" id="add">+</button>
        <button class="button" id="calc">=</button>


      </div>





    </div>














  </div>
</body>

</html>
